name: Auto-label PRs
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, edited]

jobs:
  auto-labeling:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Based on PR template checkboxes
        if: github.event.action == 'opened' || github.event.action == 'edited'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const currentLabels = context.payload.pull_request.labels.map(label => label.name);

            const labels = [];

            // Detect checked checkboxes in Type of Change section
            if (/- \[(x|X)\] 🐛 Bug fix/.test(body)) {
              labels.push('🪲 type: bug');
            }
            if (/- \[(x|X)\] ✨ New feature/.test(body)) {
              labels.push('✨ type: feature');
            }
            if (/- \[(x|X)\] 💥 Breaking change/.test(body)) {
              labels.push('⚠️ BREAKING');
            }
            if (/- \[(x|X)\] 📚 Documentation/.test(body)) {
              labels.push('📝 type: documentation');
            }
            if (/- \[(x|X)\] 🔧 Configuration/.test(body)) {
              labels.push('🔧 type: maintenance');
            }

            const newLabels = labels.filter(label => !currentLabels.includes(label));

            if (newLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: newLabels
              });
            }

      - name: Based on files changed
        if: github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'ready_for_review'
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          configuration-path: .github/labeler.yml
